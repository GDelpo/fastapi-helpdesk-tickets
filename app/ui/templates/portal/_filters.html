<div class="filter-panel">
  <details class="group" open>
    <summary class="flex items-center cursor-pointer list-none">
      <span class="filter-title">
        <i class="fas fa-sliders-h text-blue-600"></i>
        Filtros y ordenamiento
        <span id="filters-active-pill" class="filter-pill">
          Filtros activos
        </span>
      </span>
      <span class="ml-auto transition-transform group-open:rotate-180 text-gray-400">
        <i class="fas fa-chevron-down"></i>
      </span>
    </summary>
    <div class="mt-3 pt-3 border-t border-gray-100">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
        <div class="relative md:col-span-2">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fas fa-search text-gray-400"></i>
          </div>
          <input type="text" id="filter-search" placeholder="Buscar por título, categoría o ID..."
                 class="input input-icon-left filter-control bg-white" />
        </div>
        <select id="filter-status" class="select filter-control">
          <option value="">Todos los estados</option>
          <option value="open">Abierto</option>
          <option value="in_progress">En curso</option>
          <option value="pending">Pendiente</option>
          <option value="reopened">Reabierto</option>
          <option value="resolved">Resuelto</option>
          <option value="closed">Cerrado</option>
          <option value="active">Solo activos</option>
          <option value="archived">Solo archivados</option>
        </select>
        <select id="sort-by" class="select filter-control" data-default-sort="updated_desc">
          <option value="updated_desc">Ordenar: reciente</option>
          <option value="status">Ordenar: estado</option>
          <option value="updated_asc">Ordenar: más antiguo</option>
          <option value="title_asc">Ordenar: título A-Z</option>
          <option value="title_desc">Ordenar: título Z-A</option>
        </select>
      </div>
      <div class="filter-actions mt-4">
        <button type="button" onclick="applyFilters()" class="btn btn-primary h-10 text-[13px]">
          <i class="fas fa-search mr-2"></i>Aplicar
        </button>
        <button type="button" onclick="clearFilters()" class="btn btn-secondary h-10 text-[13px]">
          <i class="fas fa-times mr-2"></i>Limpiar
        </button>
      </div>
    </div>
  </details>
</div>
