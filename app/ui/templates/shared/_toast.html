<!-- Toast container -->
<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
<script>
// Toast (richer)
function showToast(message, type = 'info', duration = 4500) {
  const container = document.getElementById('toast-container');
  const icons = {
    success: 'fa-check-circle',
    error:   'fa-times-circle',
    info:    'fa-info-circle',
    warning: 'fa-exclamation-circle',
  };
  const colors = {
    success: 'text-green-500',
    error:   'text-red-500',
    info:    'text-blue-500',
    warning: 'text-amber-500',
  };
  const item = document.createElement('div');
  item.className = `toast-item toast-${type}`;
  item.innerHTML = `
    <i class="fa-solid ${icons[type]||'fa-info-circle'} flex-shrink-0 mt-0.5 ${colors[type]||'text-blue-500'}"></i>
    <div class="flex-1 text-sm text-gray-700 leading-snug">${message}</div>
    <button onclick="this.closest('.toast-item').remove()"
            class="text-gray-300 hover:text-gray-500 flex-shrink-0 ml-1 transition-colors text-xs">✕</button>`;
  container.appendChild(item);
  setTimeout(() => {
    item.style.animation = 'toastOut .25s ease forwards';
    setTimeout(() => item.remove(), 260);
  }, duration);
}
</script>
