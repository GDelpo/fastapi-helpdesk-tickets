# ============================================================================
# Tickets Service - Docker Compose (Production standalone, sin Traefik)
# ============================================================================
#
# USAGE:
#   cd tickets
#   docker compose --env-file .env -f docker/docker-compose.prod.standalone.yml up -d --build api
# ============================================================================

name: tickets

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tickets_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tickets}
      POSTGRES_USER: ${DB_USER:-tickets_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tickets_user} -d ${DB_NAME:-tickets}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Tickets API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # admin.css y portal.css se compilan en el Dockerfile (stage frontend-builder)
    container_name: tickets_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Docker network overrides
      DB_HOST: postgres
      DB_PORT: "5432"
      DEBUG: "false"
    volumes:
      - attachments_data:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    name: tickets_postgres_data
  attachments_data:
    name: tickets_attachments_data
